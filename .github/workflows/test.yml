name: test

on: [push, pull_request]

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build ccompress
        run: |
          std=c23; cc -std=$std -E -x c /dev/null -o /dev/null 2>/dev/null || std=c2x
          cc -Wall -Wextra -pedantic -std=$std -O2 -D_POSIX_C_SOURCE=200809L -lpthread -o ccompress compress.c
      - name: Run tests
        run: |
          make test
          ./test/run.sh
      - name: Generate Argo.c for downstream jobs
        run: ./ccompress compress.c Makefile README.md -o Argo.c
      - uses: actions/upload-artifact@v7
        with:
          name: Argo.c
          path: Argo.c

  linux-musl:
    runs-on: ubuntu-latest
    container: alpine:latest
    steps:
      - uses: actions/checkout@v7
      - name: Install deps
        run: apk add --no-cache gcc musl-dev make
      - name: Build and test
        run: |
          std=c23; cc -std=$std -E -x c /dev/null -o /dev/null 2>/dev/null || std=c2x
          cc -Wall -Wextra -pedantic -std=$std -O2 -D_POSIX_C_SOURCE=200809L -lpthread -o ccompress compress.c
          make test
          ./test/run.sh

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build and test
        run: |
          std=c23; cc -std=$std -E -x c /dev/null -o /dev/null 2>/dev/null || std=c2x
          cc -Wall -Wextra -pedantic -std=$std -O2 -D_POSIX_C_SOURCE=200809L -lpthread -o ccompress compress.c
          make test
          ./test/run.sh

  mingw:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v7
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-gcc make diffutils
      - name: Build and test
        run: |
          std=c23; gcc -std=$std -E -x c /dev/null -o /dev/null 2>/dev/null || std=c2x
          gcc -Wall -Wextra -pedantic -std=$std -O2 -D_POSIX_C_SOURCE=200809L -lpthread -o ccompress compress.c
          make test
          ./test/run.sh

  msvc:
    needs: linux
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          name: Argo.c
      - uses: ilammy/msvc-dev-cmd@v1
      - name: Compile Argo.c with MSVC
        run: cl Argo.c /FeArgo.exe
      - name: Extract and verify
        run: |
          mkdir extract_test
          Copy-Item compress.c,Makefile,README.md -Destination extract_test\
          Push-Location extract_test
          ..\Argo.exe
          Pop-Location
          git diff --exit-code --no-index --ignore-cr-at-eol .\extract_test\compress.c .\compress.c
          git diff --exit-code --no-index --ignore-cr-at-eol .\extract_test\Makefile .\Makefile
          git diff --exit-code --no-index --ignore-cr-at-eol .\extract_test\README.md .\README.md
