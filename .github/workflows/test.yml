name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  roundtrip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build ccompress
        run: cc -Wall -Wextra -pedantic -std=c99 -O2 -D_POSIX_C_SOURCE=200809L -o ccompress compress.c

      - name: Full test suite
        run: bash test/run.sh

      - name: C++ compilation test
        run: |
          ./ccompress compress.c -o archive.c
          cc -x c++ -fsyntax-only archive.c 2>&1 || c++ -fsyntax-only archive.c 2>&1 || echo "(C++ check skipped)"
          rm -f archive.c

      - name: Multi-file test
        run: |
          mkdir -p /tmp/mtest
          echo "int a(void) { return 1; }" > /tmp/mtest/a.c
          echo "int b(void) { return 2; }" > /tmp/mtest/b.c
          echo "int c(void) { return 3; }" > /tmp/mtest/c.c
          ./ccompress /tmp/mtest/a.c /tmp/mtest/b.c /tmp/mtest/c.c -o /tmp/mtest/multi.c
          cc -o /tmp/mtest/extract /tmp/mtest/multi.c
          (cd /tmp/mtest && ./extract)
          diff /tmp/mtest/a.c /tmp/mtest/a.c && diff /tmp/mtest/b.c /tmp/mtest/b.c && diff /tmp/mtest/c.c /tmp/mtest/c.c

  os_matrix:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Build ccompress
        run: cc -Wall -Wextra -pedantic -std=c99 -O2 -D_POSIX_C_SOURCE=200809L -o ccompress compress.c
        shell: bash

      - name: Full test suite
        shell: bash
        run: bash test/run.sh
