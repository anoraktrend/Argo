name: test

on: [push, pull_request]

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Build ccompress
        run: |
          std=c23; cc -std=$std -E -x c /dev/null -o /dev/null 2>/dev/null || std=c2x
          cc -Wall -Wextra -pedantic -std=$std -O2 -D_POSIX_C_SOURCE=200809L -lpthread -o ccompress compress.c
      - name: Run tests
        run: make test
      - name: Generate Argo.c for downstream jobs
        run: ./ccompress compress.c Makefile README.md -o Argo.c
      - uses: actions/upload-artifact@v4
        with:
          name: Argo.c
          path: Argo.c

  msvc:
    needs: linux
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v4
        with:
          name: Argo.c
      - uses: ilammy/msvc-dev-cmd@v1
      - name: Compile Argo.c with MSVC
        run: cl Argo.c /FeArgo.exe
      - name: Extract and verify
        shell: cmd
        run: |
          mkdir extract_test
          copy compress.c Makefile README.md extract_test\
          cd extract_test
          ..\Argo.exe
          fc /b compress.c ..\compress.c
          fc /b Makefile ..\Makefile
          fc /b README.md ..\README.md
