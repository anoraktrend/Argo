name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build ccompress
        run: cc -Wall -Wextra -pedantic -std=c99 -O2 -D_POSIX_C_SOURCE=200809L -o ccompress compress.c

      - name: Create self-extracting release archive
        run: |
          ./ccompress compress.c Makefile -o Argo.c
          echo "=== Release archive contents ==="
          head -5 Argo.c

      - name: Verify round-trip
        run: |
          cc -o verify Argo.c
          ./verify
          diff compress.c compress.c
          diff Makefile Makefile
          rm -f verify compress.c Makefile
          echo "Round-trip OK"

      - name: Restore source for release artifact clarity
        run: git checkout .

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          printf 'Self-extracting C archive containing the ccompress source.\n\nUsage:\n  cc -o extract Argo.c && ./extract\n\nProduces: compress.c, Makefile\n' > release-notes.md
          gh release upload "${{ github.ref_name }}" Argo.c --clobber \
            --repo "${{ github.repository }}" || {
            gh release create "${{ github.ref_name }}" Argo.c \
              --title "${{ github.ref_name }}" \
              --notes-file release-notes.md \
              --repo "${{ github.repository }}"
          }
