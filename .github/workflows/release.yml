name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.1)"
        required: true
        default: "v0.0.0"
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Resolve tag name
        id: tag
        run: echo "name=${{ github.event.inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Build ccompress
        run: cc -Wall -Wextra -pedantic -std=c23 -O2 -D_POSIX_C_SOURCE=200809L -o ccompress compress.c

      - name: Create self-extracting release archive
        run: |
          ./ccompress compress.c Makefile README.md -o Argo.c
          echo "=== Release archive contents ==="
          head -5 Argo.c

      - name: Verify round-trip
        run: |
          cc -o verify Argo.c
          ./verify
          diff compress.c compress.c
          diff Makefile Makefile
          diff README.md README.md
          rm -f verify compress.c Makefile README.md
          echo "Round-trip OK"

      - name: Restore source for release artifact clarity
        run: git checkout .

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "# Argo ${{ steps.tag.outputs.name }}" > release-notes.md
          echo "" >> release-notes.md
          echo "Self-extracting C archive containing the ccompress source." >> release-notes.md
          echo "" >> release-notes.md
          echo "## Changes" >> release-notes.md
          echo "" >> release-notes.md
          echo "- LZMA2 compression with range-coded entropy coding and 11-bit probability models" >> release-notes.md
          echo "- Multithreaded chunked encoding via C11 threads" >> release-notes.md
          echo "- Multithreaded file extraction in the generated archive" >> release-notes.md
          echo "- Legacy LZ77/LZ78 fallback for incompressible data" >> release-notes.md
          echo "" >> release-notes.md
          echo "## Usage" >> release-notes.md
          echo "" >> release-notes.md
          echo '```' >> release-notes.md
          echo "cc -o extract Argo.c && ./extract" >> release-notes.md
          echo '```' >> release-notes.md
          echo "" >> release-notes.md
          echo "Produces: compress.c, Makefile, README.md" >> release-notes.md
          gh release upload "${{ steps.tag.outputs.name }}" Argo.c --clobber \
            --repo "${{ github.repository }}" || {
            gh release create "${{ steps.tag.outputs.name }}" Argo.c \
              --title "${{ steps.tag.outputs.name }}" \
              --notes-file release-notes.md \
              --repo "${{ github.repository }}"
          }
